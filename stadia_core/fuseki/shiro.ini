[main]
plainMatcher = org.apache.shiro.authc.credential.SimpleCredentialsMatcher

[users]
# Password is injected from the FUSEKI_PASSWORD env var by start.sh at boot.
fuseki = FUSEKI_PASSWORD_PLACEHOLDER

[urls]
# Reads are public; writes and the admin console require Basic auth.
/stadia/sparql = anon
/stadia/update = authcBasic
/stadia/data   = authcBasic
/$/**          = authcBasic
/**            = anon
